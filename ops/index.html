<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HD Ops">
<meta name="robots" content="noindex,nofollow">
<title>Heat Dragon Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAFBF9; --ink:#16262E; --muted:#5A6C74;
    --flame:#0B6E8F; --flame-deep:#095B77; --flame-lt:#BFE3EE; --flame-bg:#EAF4F8;
    --copper:#B4693C; --copper-lt:#F5EDE5;
    --mist:#EDF3F1; --line:#DFE8E6;
    --ok:#2E7D57; --ok-bg:#E8F5EE;
    --warn:#B4483C; --warn-bg:#FAEEEC;
    --disp:"Bricolage Grotesque",system-ui,sans-serif;
    --body:"Instrument Sans",system-ui,sans-serif;
    --mono:"Spline Sans Mono",ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--body);background:var(--mist);color:var(--ink);
    font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;
    display:flex;justify-content:center;
  }
  .app{
    width:100%;max-width:480px;background:var(--paper);
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;
    border-inline:1px solid var(--line);position:relative;
  }

  /* ---- header ---- */
  .top{
    display:flex;align-items:center;gap:10px;
    padding:14px 16px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(250,251,249,.95);backdrop-filter:blur(10px);z-index:20;
  }
  .top svg.logo{width:36px;height:auto}
  .top .t{font-family:var(--disp);font-weight:700;font-size:1.02rem;letter-spacing:-.01em}
  .top .t small{display:block;font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
  .proto{
    margin-left:auto;font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--copper);border:1px dashed var(--copper);
    border-radius:999px;padding:4px 9px;
  }

  /* ---- views ---- */
  main{flex:1;padding:16px 16px 96px;overflow-y:auto}
  .view{display:none}
  .view.on{display:block}
  .vh{display:flex;align-items:baseline;justify-content:space-between;margin:6px 0 14px}
  .vh h2{font-family:var(--disp);font-weight:700;font-size:1.35rem;letter-spacing:-.02em}
  .vh span{font-family:var(--mono);font-size:.68rem;color:var(--muted);letter-spacing:.08em}

  /* ---- dashboard summary ---- */
  .dash{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .dash-card{
    background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;
  }
  .dash-card .d-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .dash-card .d-val{font-family:var(--disp);font-weight:700;font-size:1.6rem;letter-spacing:-.02em;line-height:1}
  .dash-card .d-sub{font-size:.74rem;color:var(--muted);margin-top:3px}
  .dash-card.highlight{background:var(--ink);border-color:var(--ink)}
  .dash-card.highlight .d-label{color:rgba(255,255,255,.5)}
  .dash-card.highlight .d-val{color:#fff}
  .dash-card.highlight .d-sub{color:rgba(255,255,255,.45)}
  .dash-card.ok{background:var(--ok-bg);border-color:#B8DFC9}
  .dash-card.ok .d-val{color:var(--ok)}

  /* ---- search / filter ---- */
  .search-bar{
    display:flex;align-items:center;gap:8px;
    background:#fff;border:1px solid var(--line);border-radius:10px;
    padding:9px 12px;margin-bottom:14px;
  }
  .search-bar svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none}
  .search-bar input{
    flex:1;border:none;background:transparent;font-family:var(--body);font-size:.9rem;color:var(--ink);outline:none;
  }
  .search-bar input::placeholder{color:#9FAFB5}
  .filter-pills{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;scrollbar-width:none}
  .filter-pills::-webkit-scrollbar{display:none}
  .pill{
    font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;
    border:1px solid var(--line);border-radius:999px;padding:5px 11px;
    background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .12s;
  }
  .pill.on{background:var(--ink);border-color:var(--ink);color:#fff}

  /* ---- cards ---- */
  .card{
    background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:10px;
  }
  .card.tap{cursor:pointer;transition:border-color .12s,transform .12s,box-shadow .12s}
  .card.tap:active{transform:scale(.985);border-color:var(--flame)}
  .card.tap:hover{border-color:var(--flame-lt);box-shadow:0 2px 12px rgba(11,110,143,.08)}
  .card.urgent{border-left:3px solid var(--warn)}
  .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .who{font-weight:600;font-size:.98rem}
  .pc{font-family:var(--mono);font-size:.7rem;color:var(--muted);letter-spacing:.04em}
  .ts{margin-left:auto;font-family:var(--mono);font-size:.64rem;color:var(--muted)}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .chip{
    font-family:var(--mono);font-size:.62rem;letter-spacing:.06em;text-transform:uppercase;
    border:1px solid var(--line);border-radius:999px;padding:4px 9px;color:var(--ink);background:var(--paper);
  }
  .chip.hot{border-color:var(--warn);color:var(--warn);background:var(--warn-bg)}
  .chip.blue{border-color:var(--flame);color:var(--flame);background:var(--flame-bg)}
  .chip.ok{border-color:var(--ok);color:var(--ok);background:var(--ok-bg)}
  .msg{color:var(--muted);font-size:.88rem;margin-top:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .auto{
    display:flex;gap:7px;align-items:flex-start;margin-top:10px;
    font-size:.74rem;color:var(--flame-deep);background:var(--flame-bg);border-radius:8px;padding:7px 9px;
  }
  .auto b{font-weight:600}
  .auto-icon{font-size:.9rem;flex:none}

  /* priority indicator */
  .priority-dot{
    width:8px;height:8px;border-radius:50%;flex:none;
    background:var(--line);
  }
  .priority-dot.high{background:var(--warn)}
  .priority-dot.med{background:var(--copper)}
  .priority-dot.low{background:var(--ok)}

  /* pipeline */
  .col{margin-bottom:22px}
  .col-header{
    font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:10px;
  }
  .col-header::before{content:"";width:20px;height:2px;background:var(--copper);flex:none}
  .col-header .col-count{
    margin-left:auto;background:var(--mist);border-radius:999px;
    padding:2px 8px;font-size:.6rem;color:var(--ink);
  }
  .amount{font-family:var(--mono);font-size:.86rem;color:var(--ink);font-weight:500}
  .cta-row{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  .btn{
    font-family:var(--body);font-weight:600;font-size:.82rem;
    border-radius:999px;padding:9px 15px;cursor:pointer;border:1.5px solid var(--ink);
    background:var(--ink);color:#fff;transition:opacity .12s,transform .12s;
    display:inline-flex;align-items:center;gap:5px;
  }
  .btn:active{opacity:.85;transform:scale(.97)}
  a.btn{text-decoration:none;justify-content:center}
  .wk-nav{display:inline-flex;align-items:center;gap:8px}
  .wk-btn{
    font-family:var(--mono);font-size:.9rem;line-height:1;color:var(--ink);
    background:var(--mist);border:1px solid var(--line);border-radius:8px;
    width:26px;height:26px;cursor:pointer;
  }
  .sheet .photos img.ph{
    width:74px;height:74px;object-fit:cover;border-radius:10px;
    border:1px solid var(--line);display:block;
  }
  .btn.line{background:transparent;color:var(--ink)}
  .btn.blue{background:var(--flame);border-color:var(--flame)}
  .btn.soft{background:var(--mist);border-color:var(--mist);color:var(--ink)}
  .btn.ok{background:var(--ok);border-color:var(--ok)}
  .btn.warn{background:var(--warn);border-color:var(--warn)}
  .paid{color:var(--ok);font-family:var(--mono);font-size:.72rem;display:flex;align-items:center;gap:4px}
  .del-x{
    width:22px;height:22px;border-radius:50%;flex:none;margin-left:6px;
    border:1px solid var(--line);background:#fff;color:var(--muted);
    font-size:.7rem;line-height:1;cursor:pointer;
  }
  .del-x:active{border-color:var(--warn);color:var(--warn)}

  /* revenue line */
  .rev-line{
    background:linear-gradient(135deg,var(--ink) 0%,#1E3A47 100%);
    border-radius:12px;padding:14px 16px;margin-bottom:18px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .rev-line .rl{font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:2px}
  .rev-line .rv{font-family:var(--disp);font-weight:700;font-size:1.4rem;color:#fff;letter-spacing:-.02em}
  .rev-line .rv small{font-size:.75rem;color:rgba(255,255,255,.45);font-family:var(--mono);font-weight:400;margin-left:4px}

  /* diary */
  .place-banner{
    background:var(--flame);color:#fff;border-radius:12px;padding:11px 13px;
    font-size:.85rem;display:none;align-items:center;gap:10px;margin-bottom:14px;
  }
  .place-banner.on{display:flex}
  .place-banner button{margin-left:auto;background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:999px;padding:6px 11px;font-size:.74rem;cursor:pointer}
  .week-summary{
    background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:16px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .week-summary .ws-label{font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .week-summary .ws-val{font-family:var(--disp);font-weight:700;font-size:1.2rem}
  .week-summary .ws-detail{font-size:.78rem;color:var(--muted);margin-top:1px}
  .day{margin-bottom:16px}
  .day h4{font-family:var(--mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .day h4 .day-total{margin-left:auto;color:var(--copper);font-size:.62rem}
  .slots{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .van-lbl{font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
  .slot{
    border:1px solid var(--line);border-radius:10px;padding:8px 10px;min-height:52px;
    background:#fff;font-size:.78rem;display:flex;flex-direction:column;justify-content:center;
  }
  .slot .l{font-family:var(--mono);font-size:.56rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .slot .j{font-weight:600;margin-top:2px;font-size:.8rem;line-height:1.25}
  .slot.empty{background:var(--paper);color:var(--muted)}
  .slot.empty .j{font-weight:400;font-style:normal;color:#9FAFB5}
  .slot.buffer{border-style:dashed;border-color:var(--copper);background:var(--copper-lt)}
  .slot.buffer .j{color:var(--copper);font-weight:500}
  .placing .slot.empty{border-color:var(--flame);background:var(--flame-bg);cursor:pointer}
  .placing .slot.empty:active{transform:scale(.97)}
  .slot.new{border-color:var(--ok);background:var(--ok-bg)}
  .slot.new .j{color:var(--ok)}

  /* waitlist */
  .sub{margin:26px 0 10px;font-family:var(--mono);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:flex;gap:8px;align-items:center}
  .sub::before{content:"";width:20px;height:2px;background:var(--copper);flex:none}
  .empty{
    text-align:center;color:var(--muted);padding:40px 16px;font-size:.9rem;
  }
  .empty b{display:block;font-family:var(--disp);font-size:1.1rem;color:var(--ink);margin-bottom:4px}

  /* ---- bottom nav ---- */
  nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;z-index:30;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav button{
    flex:1;background:none;border:none;padding:10px 4px 12px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;
    font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    position:relative;transition:color .15s;
  }
  nav button.on{color:var(--flame)}
  nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .badge{
    position:absolute;top:6px;right:calc(50% - 20px);
    background:var(--warn);color:#fff;font-size:.58rem;min-width:16px;height:16px;
    border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px;
    font-family:var(--mono);
  }

  /* ---- sheet ---- */
  .overlay{
    position:fixed;inset:0;background:rgba(22,38,46,.45);z-index:40;display:none;
    align-items:flex-end;justify-content:center;
  }
  .overlay.on{display:flex}
  .sheet{
    width:100%;max-width:480px;background:var(--paper);border-radius:20px 20px 0 0;
    padding:20px 18px calc(24px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;
  }
  .sheet-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px}
  .sheet h3{font-family:var(--disp);font-weight:700;font-size:1.2rem;letter-spacing:-.01em}
  .sheet .pcline{font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-top:2px;letter-spacing:.05em}
  .sheet .body{margin-top:12px;font-size:.92rem;color:var(--ink);line-height:1.6}
  .sheet .photos{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  .sheet .photos i{
    width:58px;height:58px;border-radius:8px;background:var(--mist);border:1px dashed #B9C6C4;
    display:flex;align-items:center;justify-content:center;font-style:normal;font-size:1.1rem;color:var(--muted);
  }
  .sheet .actions{display:grid;gap:9px;margin-top:18px}
  .sheet .actions .btn{width:100%;padding:13px;font-size:.9rem;justify-content:center}
  .sheet label{font-size:.76rem;font-weight:600;display:block;margin:14px 0 6px;letter-spacing:.02em}
  .sheet input{
    width:100%;font-family:var(--mono);font-size:1.1rem;padding:12px;border-radius:10px;
    border:1.5px solid var(--line);background:#fff;color:var(--ink);transition:border-color .15s;
  }
  .sheet input:focus{outline:none;border-color:var(--flame)}
  .sheet .x{
    float:right;margin-top:-4px;
    background:var(--mist);border:none;border-radius:999px;width:32px;height:32px;
    font-size:1rem;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;
    transition:background .12s;
  }
  .sheet .x:hover{background:var(--line)}
  .hint{font-size:.76rem;color:var(--muted);margin-top:10px;line-height:1.5}
  .hint a{color:var(--flame);text-decoration:underline;text-underline-offset:2px}

  /* detail row in sheet */
  .detail-row{
    display:flex;gap:8px;margin-top:12px;padding:10px 12px;
    background:#fff;border:1px solid var(--line);border-radius:10px;
  }
  .detail-row .dr-label{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);min-width:64px}
  .detail-row .dr-val{font-size:.88rem;font-weight:500}

  /* pass options */
  .pass-opts{display:grid;gap:8px;margin-top:14px}
  .pass-opt{
    background:#fff;border:1.5px solid var(--line);border-radius:10px;
    padding:12px 14px;cursor:pointer;transition:border-color .12s;text-align:left;
    font-family:var(--body);
  }
  .pass-opt:hover{border-color:var(--muted)}
  .pass-opt strong{display:block;font-size:.88rem;font-weight:600;margin-bottom:2px}
  .pass-opt span{font-size:.78rem;color:var(--muted)}

  /* ---- toast ---- */
  .toast{
    position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:.84rem;border-radius:999px;
    padding:11px 18px;opacity:0;transition:.25s;z-index:50;pointer-events:none;
    max-width:88%;text-align:center;white-space:nowrap;
  }
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---- section divider ---- */
  .section-divider{
    height:1px;background:var(--line);margin:18px 0;
  }

  @media (prefers-reduced-motion:reduce){
    .toast,.card.tap,.btn{transition:none}
  }
</style>
</head>

  <div class="top">
    <!-- Logo SVG -->

      </g>
    </svg>
    <div class="t">Heat Dragon<small>Ops · demand desk</small></div>
    <span class="proto" id="conn">Connecting…</span>
  </div>

  <main>

    <!-- INBOX VIEW -->
    <div class="view on" id="view-inbox">
      <div class="vh"><h2>Inbox</h2><span id="inbox-count"></span></div>

      <!-- Dashboard summary -->
      <div class="dash" id="dash-cards"></div>

<script>

const SUPABASE_URL = 'https://xmenqtixowwxmfwtfntr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhtZW5xdGl4b3d3eG1md3RmbnRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3NzMzOTgsImV4cCI6MjA5OTM0OTM5OH0.NrHrA831Iij8IW745jIgmU6g0TUKSicBTTBwjm9SBC4';

const $ = id => document.getElementById(id);

const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function startOfWeek(d){
  const x = new Date(d);
  x.setDate(x.getDate() - ((x.getDay() + 6) % 7));
  x.setHours(0,0,0,0);
  return x;
}
function isoDate(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function weekDays(){
  return [0,1,2,3,4].map(i => { const d = new Date(S.weekStart); d.setDate(d.getDate()+i); return d; });
}
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function dayLabel(d){ return `${DAY_NAMES[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`; }

function fmtTs(ts){
  if(!ts) return '';
  const t = new Date(ts);
  if(isNaN(t)) return '';
  const days = Math.floor((startOfDay(new Date()) - startOfDay(t)) / 86400000);
  if(days <= 0) return t.toTimeString().slice(0,5);
  if(days === 1) return 'Yesterday';
  if(days < 7) return DAY_NAMES[t.getDay()];
  return `${t.getDate()} ${MONTHS[t.getMonth()]}`;
}
function startOfDay(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }

function wshort(e){
  const w = e.when_needed || '';
  return w.startsWith('As soon') ? 'ASAP' : w;
}
function priorityOf(e){
  const w = wshort(e);
  return w === 'ASAP' ? 'high' : w === 'Within a month' ? 'med' : 'low';
}
function firstName(n){ return (n || '').split(' ')[0]; }

function waLink(phone, text){
  let digits = String(phone || '').replace(/\D/g, '');
  if(digits.startsWith('0')) digits = '44' + digits.slice(1);
  return `https://wa.me/${digits}${text ? '?text=' + encodeURIComponent(text) : ''}`;
}

function toast(t, dur=2800){
  const el = $('toast');
  el.textContent = t;
  el.classList.add('on');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('on'), dur);
}

function show(v){
  ['inbox','pipe','diary'].forEach(k => {
    $('view-'+k).classList.toggle('on', k===v);

}

function fail(error){
  toast('Hmm — ' + (error.message || 'something went wrong'));
  throw error;
}

async function loadState(){
  const [enq, bk] = await Promise.all([
    sb.from('enquiries').select('*, photos(path)')
      .not('status', 'in', '("declined","done")')
      .order('id', { ascending: false }),
    sb.from('bookings').select('*').order('date')
  ]);
  if(enq.error) fail(enq.error);
  if(bk.error) fail(bk.error);
  const rows = enq.data.map(e => ({ ...e, photos: (e.photos || []).map(p => p.path) }));
  S.enquiries = rows.filter(e => e.status === 'new');
  S.waitlist  = rows.filter(e => e.status === 'waitlist');
  S.quoted    = rows.filter(e => e.status === 'quoted');
  S.deposit   = rows.filter(e => e.status === 'deposit');
  S.bookings  = bk.data;
  S.sched     = rows.filter(e => e.status === 'scheduled')
                    .map(e => ({ ...e, booking: bk.data.find(b => b.enquiry_id === e.id) || null }));
  $('conn').textContent = 'Live';
  renderAll();
}

let activeFilter = 'all';

function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  renderInbox();
}
function filterInbox(){ renderInbox(); }

function getFilteredEnquiries(){
  const q = ($('inbox-search')||{value:''}).value.toLowerCase();
  return S.enquiries.filter(e => {
    const matchFilter = activeFilter === 'all' || e.type === activeFilter || wshort(e) === activeFilter;
    const matchSearch = !q || e.name.toLowerCase().includes(q) || e.postcode.toLowerCase().includes(q) || e.type.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
}

/* ================================================================
   DIARY DATA
================================================================ */
function weekBookings(){
  const days = weekDays().map(isoDate);
  return S.bookings.filter(b => days.includes(b.date));
}
function bookingAt(date, van, slot){
  return S.bookings.find(b => b.date === date && b.van === van && b.slot === slot);
}
function countFilledSlots(){
  return weekBookings().filter(b => b.kind !== 'buffer').length;
}
function moveWeek(dir){
  S.weekStart.setDate(S.weekStart.getDate() + dir * 7);
  renderDiary();
}

function pipelineValue(){
  const all = [...S.quoted, ...S.deposit, ...S.sched];
  let total = 0;
  all.forEach(item => {
    const m = (item.quote_amount||'').replace(/[^0-9]/g,'');
    if(m) total += parseInt(m);
  });
  return total;
}

async function openEnquiry(id){
  const e = S.enquiries.find(x => x.id === id);
  if(!e) return;
  let photoImgs = '<span class="dr-val" style="color:var(--muted)">No photos — worth asking for some before quoting.</span>';
  if(e.photos.length){
    const { data } = await sb.storage.from('photos').createSignedUrls(e.photos, 3600);
    const urls = (data || []).map(x => x.signedUrl).filter(Boolean);
    if(urls.length) photoImgs = urls.map(u =>
      `<a href="${u}" target="_blank" rel="noopener"><img class="ph" src="${u}" alt="Job photo"></a>`).join('');
  }
  openSheetHTML(`
    <h3>${esc(e.name)}</h3>
    <p class="pcline">${esc(e.postcode)} · ${esc(e.type)} · wants: ${esc(wshort(e))}</p>
    <div class="detail-row"><span class="dr-label">Contact</span><span class="dr-val">
      <a href="tel:${esc(e.phone)}">${esc(e.phone)}</a> ·
      <a href="${waLink(e.phone)}" target="_blank" rel="noopener">WhatsApp</a>${e.email ? ` · <a href="mailto:${esc(e.email)}">email</a>` : ''}
    </span></div>
    <div class="detail-row"><span class="dr-label">Message</span><span class="dr-val">${esc(e.message) || '—'}</span></div>
    <div class="photos">${photoImgs}</div>
    <div class="actions">
      <button class="btn blue" onclick="quoteForm(${e.id})">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Quote it
      </button>
      <button class="btn line" onclick="toWait(${e.id})">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Add to waitlist
      </button>
      <button class="btn line" onclick="passForm(${e.id})" style="border-color:#C9D6D4;color:var(--muted)">
        Pass politely
      </button>
      <button class="btn line" onclick="confirmDelete(${e.id})" style="border-color:var(--warn);color:var(--warn)">
        Delete — test or spam
      </button>
    </div>
    <p class="hint">Photos + postcode mean most jobs get a fixed price without a site visit.</p>`);
}

function confirmDelete(id){
  const e = findEnquiry(id);
  if(!e) return;
  openSheetHTML(`
    <h3>Delete — ${esc(e.name)}?</h3>
    <p class="pcline">${esc(e.type)} · status: ${esc(e.status)}. Gone for good, photos and diary slot included. For a real customer you're turning down, use <b>Pass politely</b> instead — this is for tests and spam.</p>
    <div class="actions">
      <button class="btn line" style="border-color:var(--warn);color:var(--warn)" onclick="deleteEnquiry(${e.id})">Delete permanently</button>
      <button class="btn line" onclick="closeSheet()">Keep it</button>
    </div>`);
}

function findEnquiry(id){
  return [...S.enquiries, ...S.waitlist, ...S.quoted, ...S.deposit, ...S.sched].find(x => x.id === id);
}

async function deleteEnquiry(id){
  const e = findEnquiry(id);
  if(e && e.photos && e.photos.length) await sb.storage.from('photos').remove(e.photos);
  await sb.from('bookings').delete().eq('enquiry_id', id); // frees the diary slot of a scheduled job
  const { error } = await sb.from('enquiries').delete().eq('id', id);
  if(error) return fail(error);
  closeSheet();
  await loadState();
  toast('Enquiry deleted');
}

function quoteForm(id){
  const e = S.enquiries.find(x => x.id === id);
  openSheetHTML(`
    <h3>Quote — ${esc(e.name)}</h3>
    <p class="pcline">${esc(e.type)} · ${esc(e.postcode)}</p>
    <label for="amt">Fixed price (inc. parts &amp; labour)</label>
    <input id="amt" inputmode="decimal" placeholder="£ 0.00" value="£ ">
    <label for="est-days" style="margin-top:12px">Estimated duration</label>
    <input id="est-days" placeholder="e.g. 1 day, half day, 3 days">
    <div class="actions">
      <button class="btn blue" onclick="sendQuote(${e.id})">Save quote →</button>
    </div>
    <p class="hint">Saving moves the job to the pipeline, then opens the quote pre-written in WhatsApp with a space for the deposit link.</p>`);
}

async function sendQuote(id){
  const e = S.enquiries.find(x => x.id === id);
  const amt = ($('amt').value || '').replace(/^£\s*$/, '').trim();
  const est = ($('est-days').value || '').trim();
  if(!amt){ toast('Put a price in first'); return; }
  const { error } = await sb.from('enquiries').update({
    status: 'quoted', quote_amount: amt, quote_est: est || null,
    quote_sent_at: new Date().toISOString(), updated_at: new Date().toISOString()
  }).eq('id', id);
  if(error) return fail(error);
  await loadState();
  show('pipe');
  waFollowupSheet(`Quote saved — ${e.name}`, `${amt} · ${e.type}`, e.phone, TPL.quote(e, amt, est));
}

async function toWait(id){
  const e = S.enquiries.find(x => x.id === id);
  const { error } = await sb.from('enquiries').update({
    status: 'waitlist', waitlist_note: 'From inbox — flexible timing', updated_at: new Date().toISOString()
  }).eq('id', id);
  if(error) return fail(error);
  await loadState();
  waFollowupSheet(`On the waitlist — ${e.name}`, 'A holding reply keeps the door open.', e.phone, TPL.waitlist(e));
}

function passForm(id){
  const e = S.enquiries.find(x => x.id === id);
  openSheetHTML(`
    <h3>Pass — ${esc(e.name)}</h3>
    <p class="pcline">Pick a reason. A polite template opens in WhatsApp.</p>
    <div class="pass-opts">
      <button class="pass-opt" onclick="doPass(${e.id},'distance')">
        <strong>Too far out</strong>
        <span>Outside our current service area.</span>
      </button>
      <button class="pass-opt" onclick="doPass(${e.id},'fit')">
        <strong>Not our kind of job</strong>
        <span>Outside our specialisms — point them to the right trade.</span>
      </button>
      <button class="pass-opt" onclick="doPass(${e.id},'time')">
        <strong>Can't meet the timeline</strong>
        <span>Fully booked for their window.</span>
      </button>
    </div>`);
}

async function doPass(id, why){
  const e = S.enquiries.find(x => x.id === id);
  const { error } = await sb.from('enquiries').update({
    status: 'declined', decline_reason: why, updated_at: new Date().toISOString()
  }).eq('id', id);
  if(error) return fail(error);
  await loadState();
  waFollowupSheet(`Passed — ${e.name}`, 'Door left open, bridge unburnt.', e.phone, TPL.pass[why](e));
}

async function markDeposit(id){
  const q = S.quoted.find(x => x.id === id);
  const { error } = await sb.from('enquiries').update({
    status: 'deposit', deposit_at: new Date().toISOString(), updated_at: new Date().toISOString()
  }).eq('id', id);
  if(error) return fail(error);
  await loadState();
  toast(`${q.name} — deposit in. Job needs a date.`);
}

function startPlace(id){
  S.placing = S.deposit.find(x => x.id === id);
  renderDiary();
  show('diary');
}

function cancelPlace(){
  S.placing = null;
  renderDiary();
}

function openSlot(date, van, slot){
  const b = bookingAt(date, van, slot);
  if(S.placing && !b){ placeAt(date, van, slot); return; }
  if(S.placing) { toast('That slot is taken — pick a free one'); return; }
  if(b) removeSlotSheet(b);
  else addSlotSheet(date, van, slot);
}

async function placeAt(date, van, slot){
  const d = S.placing;
  const { error } = await sb.from('bookings').insert({
    date, van, slot, label: `${d.type} — ${d.name}`, kind: 'job', enquiry_id: d.id
  });
  if(error){
    toast(error.code === '23505' ? 'That slot is taken — pick a free one' : 'Could not book the slot');
    return;
  }
  const { error: upErr } = await sb.from('enquiries').update({
    status: 'scheduled', updated_at: new Date().toISOString()
  }).eq('id', d.id);
  if(upErr) return fail(upErr);
  S.placing = null;
  await loadState();
  const day = new Date(date + 'T00:00:00');
  const when = `${dayLabel(day)}, ${slot} (Van ${van})`;
  waFollowupSheet(`Booked — ${d.name}`, `${when} · ${d.type}`, d.phone, TPL.booked(d, when));
}

function addSlotSheet(date, van, slot){
  const day = new Date(date + 'T00:00:00');
  openSheetHTML(`
    <h3>${dayLabel(day)} · ${slot} · Van ${van}</h3>
    <p class="pcline">Block this slot by hand — a service, a revisit, or protected buffer.</p>
    <label for="slot-label">What's it for?</label>
    <input id="slot-label" placeholder="e.g. Boiler service — SW4">
    <div class="actions">
      <button class="btn blue" onclick="addManualSlot('${date}',${van},'${slot}',false)">Add entry</button>
      <button class="btn line" onclick="addManualSlot('${date}',${van},'${slot}',true)">Mark as buffer — kept free</button>
    </div>`);
}

async function addManualSlot(date, van, slot, isBuffer){
  const label = ($('slot-label').value || '').trim();
  if(!isBuffer && !label){ toast('Give the entry a name'); return; }
  const { error } = await sb.from('bookings').insert({
    date, van, slot,
    label: isBuffer ? 'Buffer — kept free' : label,
    kind: isBuffer ? 'buffer' : 'manual'
  });
  if(error){
    toast(error.code === '23505' ? 'That slot is taken' : 'Could not save');
    return;
  }
  closeSheet();
  await loadState();
  toast(isBuffer ? 'Buffer protected ✓' : 'Slot booked ✓');
}

function removeSlotSheet(b){
  openSheetHTML(`
    <h3>${esc(b.label)}</h3>
    <p class="pcline">${b.date} · ${b.slot} · Van ${b.van}</p>
    <div class="actions">
      <button class="btn line" style="border-color:var(--warn);color:var(--warn)" onclick="removeBooking(${b.id})">
        ${b.kind === 'job' ? 'Unbook — back to "needs a date"' : 'Free this slot'}
      </button>
      <button class="btn line" onclick="closeSheet()">Keep it</button>
    </div>
    ${b.kind === 'job' ? '<p class="hint">The customer keeps their deposit status — the job just returns to the pipeline for a new date. Let them know on WhatsApp.</p>' : ''}`);
}

async function removeBooking(id){
  const b = S.bookings.find(x => x.id === id);
  const { error } = await sb.from('bookings').delete().eq('id', id);
  if(error) return fail(error);
  if(b && b.enquiry_id){
    await sb.from('enquiries').update({ status: 'deposit', updated_at: new Date().toISOString() }).eq('id', b.enquiry_id);
  }
  closeSheet();
  await loadState();
  toast('Slot freed');
}

/* ================================================================
   BOOT
================================================================ */
function renderAll(){
  renderInbox();
  renderPipe();
  renderDiary();
}

renderAll(); // paint the empty shell first, then hydrate
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    loadState().catch(() => { $('conn').textContent = 'Offline'; });
  } else {
    $('conn').textContent = 'Sign in';
    askLogin();
  }
})();
setInterval(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if(session) loadState().catch(() => {});
}, 60000);
</script>
</body>
</html>
